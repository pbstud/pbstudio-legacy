security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'bcrypt'

    role_hierarchy:
        ROLE_USER: ROLE_USER
        ROLE_ADMIN: ROLE_STAFF
        ROLE_SUPER_ADMIN: ROLE_ADMIN
        ROLE_COLLABORATOR: ROLE_STAFF
        ROLE_INSTRUCTOR: ROLE_STAFF

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_staff_provider:
            entity:
                class: App\Entity\Staff
                property: username

        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        backend:
            pattern: ^/backend
            lazy: true
            provider: app_staff_provider
            user_checker: App\Security\UserChecker

            form_login:
                login_path: backend_login
                check_path: backend_login
                enable_csrf: true
                default_target_path: backend_dashboard

            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

            logout:
                path: backend_logout
                target: backend_login

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /backend

        main:
            pattern: ^/
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                username_parameter: username
                password_parameter: password
                success_handler: App\Security\AuthenticationSuccessHandler
                failure_handler: App\Security\AuthenticationFailureHandler

            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

            logout:
                path: /logout
                target: homepage

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/backend/login, roles: PUBLIC_ACCESS }
        - { path: ^/backend, roles: ROLE_STAFF }
        - { path: ^/mi-cuenta, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
